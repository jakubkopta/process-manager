<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Process Manager{% endblock %}</title>
    <link rel="icon" href="data:,">
    <meta name="csrf-token" content="{{ csrf_token }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        document.addEventListener('htmx:configRequest', function(evt) {
            var token = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            if (token) evt.detail.headers['X-CSRFToken'] = token;
        });
    </script>
</head>

<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">

<nav class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-14">
            <a href="/" class="text-lg font-semibold text-slate-800 hover:text-slate-600 transition-colors">
                Process Manager
            </a>
            <div class="flex items-center gap-4 text-sm">
                {% if user.is_authenticated %}
                <span class="text-slate-500">{{ user.get_username }}</span>
                {% if user.is_staff %}
                <a href="{% url 'admin:index' %}" class="text-slate-600 hover:text-slate-900 font-medium transition-colors">Admin</a>
                {% endif %}
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-slate-600 hover:text-slate-900 font-medium transition-colors">Log out</button>
                </form>
                {% else %}
                {% if request.resolver_match.url_name != 'login' %}
                <a href="{% url 'login' %}?next={{ request.path }}" class="text-indigo-600 hover:text-indigo-700 font-medium transition-colors">Log in</a>
                {% endif %}
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
